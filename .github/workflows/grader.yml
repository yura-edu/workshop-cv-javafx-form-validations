name: Grader

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── Tests + Coverage ──────────────────────────────────────────────────
      - name: Run tests and generate coverage
        id: tests
        working-directory: starter-code
        run: |
          mvn test jacoco:report -B 2>&1 | tee mvn-output.txt || true

          FAILURES=$(grep -oP 'Tests run: \d+, Failures: \K\d+' mvn-output.txt | awk '{s+=$1}END{print s+0}')
          ERRORS=$(grep -oP 'Errors: \K\d+' mvn-output.txt | awk '{s+=$1}END{print s+0}')
          TOTAL_FAIL=$((FAILURES + ERRORS))

          echo "test_failures=$TOTAL_FAIL" >> "$GITHUB_OUTPUT"
          echo "Tests with failures/errors: $TOTAL_FAIL"

      # ── Métrica: test_coverage ────────────────────────────────────────────
      - name: Check test coverage
        id: coverage
        working-directory: starter-code
        run: |
          COVERAGE=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('target/site/jacoco/jacoco.xml')
              root = tree.getroot()
              for pkg in root.findall('.//package'):
                  if 'validators' in pkg.get('name', ''):
                      for counter in pkg.findall('counter[@type="LINE"]'):
                          missed = int(counter.get('missed', 0))
                          covered = int(counter.get('covered', 0))
                          total = missed + covered
                          if total > 0:
                              print(f'{covered / total * 100:.1f}')
                              exit()
              print('0.0')
          except Exception:
              print('0.0')
          EOF
          )

          PASSED=$(python3 -c "print('true' if float('$COVERAGE') >= 85 else 'false')")
          SCORE=$(python3 -c "print('1.0' if float('$COVERAGE') >= 85 else '0.0')")

          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE% (threshold: 85%)"

      # ── Métrica: lint_violations ──────────────────────────────────────────
      - name: Check Checkstyle
        id: lint
        working-directory: starter-code
        run: |
          mvn checkstyle:checkstyle -B 2>/dev/null || true

          VIOLATIONS=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('target/checkstyle-result.xml')
              root = tree.getroot()
              print(len(root.findall('.//error')))
          except Exception:
              print('0')
          EOF
          )

          PASSED=$([ "$VIOLATIONS" -eq 0 ] && echo true || echo false)
          SCORE=$([ "$PASSED" = "true" ] && echo "1.0" || echo "0.0")

          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "Checkstyle violations: $VIOLATIONS (threshold: 0)"

      # ── Reporte final ─────────────────────────────────────────────────────
      - name: Build grader report
        run: |
          cat > grader-report.json << EOF
          {
            "schemaVersion": "1.0",
            "templateSlug": "cv-javafx-form-validations",
            "runId": "${{ github.run_id }}",
            "sha": "${{ github.sha }}",
            "metrics": [
              {
                "metricKey": "test_coverage",
                "score": ${{ steps.coverage.outputs.score }},
                "passed": ${{ steps.coverage.outputs.passed }},
                "unavailable": false,
                "rawValue": ${{ steps.coverage.outputs.coverage }}
              },
              {
                "metricKey": "lint_violations",
                "score": ${{ steps.lint.outputs.score }},
                "passed": ${{ steps.lint.outputs.passed }},
                "unavailable": false,
                "rawValue": ${{ steps.lint.outputs.violations }}
              }
            ]
          }
          EOF
          cat grader-report.json

      - name: Upload grader report
        uses: actions/upload-artifact@v4
        with:
          name: grader-report
          path: grader-report.json
