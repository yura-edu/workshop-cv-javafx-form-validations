# yura.workshop.yaml — declarative grader config
# Spec: docs/grader-workers-spec.md §6
# Generated from prisma/seeds/workshop-templates.seed.ts

schema_version: "1.0"
workshop:
  id: cv-javafx-form-validations
  title: "Formulario JavaFX con validaciones"
  type: code_quality
  language: java
  passing_threshold: 70
  base_branch: main
submission:
  source: workshop_link
  required_inputs:
    - type: github_repo_url
      label: "URL del repositorio"
      required: true
evaluation_profile:
  - metric_id: form_validation_coverage
    weight: 30
    threshold: 0.85
    config:
      min_ratio: 0.85
  - metric_id: exception_handling_coverage
    weight: 20
    threshold: 0.7
    config:
      min_ratio: 0.7
  - metric_id: cyclomatic_complexity
    weight: 20
    threshold: 10
    config:
      tool: pmd
      max_per_function: 10
      aggregation: avg
      include_paths:
        - src/
      exclude_paths:
        - tests/
        - "**/__init__.py"
        - "**/*.test.ts"
        - "**/*.spec.ts"
      timeout_seconds: 120
  - metric_id: test_pass_rate
    weight: 15
    threshold: 1
    config:
      runner: maven
      report_format: junit_xml
      report_path: target/surefire-reports
      min_pass_rate_percent: 100
      timeout_seconds: 300
  - metric_id: lint_violations
    weight: 15
    threshold: 0
    config:
      tool: checkstyle
      severity_levels:
        - error
        - warning
      fail_on: error
      max_violations: 0
